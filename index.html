<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --accent: #93c90f; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; display: grid; gap: 20px; }
        .card { background: #161616; padding: 20px; border-radius: 15px; border-left: 4px solid var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 15px 0; color: var(--accent); font-size: 1.2rem; }
        textarea { width: 100%; height: 100px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        @media (max-width: 480px) { h2 { font-size: 1rem; } .card { padding: 15px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="cmd-box">
            <h2>COMMAND LINE</h2>
            <textarea placeholder="Komut girin..."></textarea>
            <button onclick="animateBtn(this)">ÇALIŞTIR</button>
        </div>
        <div class="card" id="task-box">
            <h2>TASK MANAGER</h2>
            <div id="list" style="font-size: 0.9rem; opacity: 0.8;">Sistem izleniyor...</div>
        </div>
    </div>

    <script>
        gsap.from(".card", { duration: 1, opacity: 0, y: 50, stagger: 0.2, ease: "power3.out" });
        
        function animateBtn(btn) {
            gsap.to(btn, { scale: 0.9, duration: 0.1, yoyo: true, repeat: 1 });
        }

        setInterval(() => {
            document.getElementById('list').innerHTML = "explorer.exe - OK<br>chrome.exe - OK<br>system.sys - OK";
        }, 2000);
    </script>
</body>
</html>
